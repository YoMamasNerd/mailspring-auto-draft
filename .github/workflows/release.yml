name: Release Plugin ZIP

on:
  push:
    tags:
      - 'v*'
  # Manueller Release-Lauf: legt den Tag beim Veröffentlichen selbst an.
  # Nützlich, wenn Tags nicht direkt gepusht werden können.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release-Tag (z.B. v0.4.0)'
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-zip:
    name: Build clean plugin ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Release-Gate: eine Version mit kaputten Kernpfaden darf kein ZIP werden.
      - name: Smoke tests
        run: node --test tests/*.test.js

      - name: Build plugin ZIP (respects .gitattributes)
        run: |
          mkdir -p dist
          git archive --format=zip --output=dist/ai-reply-drafts.zip HEAD

      - name: Verify ZIP contents
        run: |
          unzip -l dist/ai-reply-drafts.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/ai-reply-drafts.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, 'prerelease') || contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'rc') }}
